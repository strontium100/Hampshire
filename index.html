<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>幕末海戦シミュレーション</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>戊辰戦争</h1>

<h2>ガチャ</h2>
<button onclick="drawGacha()">10連ガチャ（初回のみ）</button>
<div id="gachaResult"></div>

<h2>所持艦</h2>
<div id="ownedShips"></div>

<h2>マップ</h2>
<div id="map"></div>

<h2>味方艦隊</h2>
<div id="playerFleet"></div>

<h2>敵艦隊</h2>
<div id="enemyFleet"></div>

<button onclick="playerAttack()">攻撃</button>

<script src="script.js"></script>
</body>
</html>

<h2>海戦</h2>

<div class="battleField">

  <div>
    <h3>味方艦隊</h3>
    <div id="playerFleet"></div>
  </div>

  <div>
    <h3>敵艦隊</h3>
    <div id="enemyFleet"></div>
  </div>

</div>

<button onclick="playerAttack()">攻撃</button>
